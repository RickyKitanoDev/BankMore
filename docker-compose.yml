services:

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: bankmore-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - bankmore-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: bankmore-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: nc -z localhost 9092 || exit 1
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - bankmore-network

  redis:
    image: redis:7-alpine
    container_name: bankmore-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - bankmore-network

  account-api:
    build:
      context: ./Account.API
      dockerfile: Dockerfile
    container_name: bankmore-account
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "5001:8080"
    volumes:
      - ./data:/app/data
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__Default=Data Source=/app/data/bankmore.db
      - Jwt__Key=Rk5pV1p4Qk1uV1pFM2xvQ2h5VmRtQ2pzM1FhV1ZpWkE=
      - Jwt__Issuer=BankMore
      - Jwt__Audience=BankMoreClients
      - Kafka__BootstrapServers=kafka:29092
      - ASPNETCORE_ENVIRONMENT=Development
    restart: unless-stopped
    networks:
      - bankmore-network

  transfer-api:
    build:
      context: ./Transfer.API
      dockerfile: Dockerfile
    container_name: bankmore-transfer
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      account-api:
        condition: service_started
    ports:
      - "5002:8080"
    volumes:
      - ./data:/app/data
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__Default=Data Source=/app/data/transfer.db
      - ConnectionStrings__Redis=redis:6379
      - Jwt__Key=Rk5pV1p4Qk1uV1pFM2xvQ2h5VmRtQ2pzM1FhV1ZpWkE=
      - Jwt__Issuer=BankMore
      - Jwt__Audience=BankMoreClients
      - AccountApi__BaseUrl=http://account-api:8080
      - Kafka__BootstrapServers=kafka:29092
      - ASPNETCORE_ENVIRONMENT=Development
    restart: unless-stopped
    networks:
      - bankmore-network

  tarifa-api:
    build:
      context: ./Tarifa.API
      dockerfile: Dockerfile
    container_name: bankmore-tarifa
    depends_on:
      kafka:
        condition: service_healthy
      account-api:
        condition: service_started
    ports:
      - "5003:8080"
    volumes:
      - ./data:/app/data
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__Default=Data Source=/app/data/tarifacao.db
      - Kafka__BootstrapServers=kafka:29092
      - Kafka__GroupId=tarifa-service
      - Kafka__Topics__TransferenciasRealizadas=transferencias-realizadas
      - Kafka__Topics__TarifasRealizadas=tarifas-realizadas
      - Tarifa__ValorPorTransferencia=2.00
      - ASPNETCORE_ENVIRONMENT=Development
    restart: unless-stopped
    networks:
      - bankmore-network

networks:
  bankmore-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
